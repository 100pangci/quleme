name: Build and Release

on:
  push:
    tags:
      - 'v*' # 仅在推送以 v 开头的标签（如 v1.0.0）时触发构建
  workflow_dispatch:
    inputs:
      prerelease:
        description: '是否标记为预发布版本'
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      HAS_SIGNING_CONFIG: ${{ secrets.SIGNING_KEY_BASE64 != '' && secrets.KEY_ALIAS != '' && secrets.KEY_PASSWORD != '' && secrets.KEY_STORE_PASSWORD != '' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.4.1'

      - name: Check Debug Build
        run: gradle :app:assembleDebug

      - name: Run Android Lint
        id: lint
        run: gradle :app:lintDebug

      - name: Upload Lint Report
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: lint-results-debug
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 1

      - name: Validate Signing Config
        if: env.HAS_SIGNING_CONFIG != 'true'
        run: |
          echo "Release signing secrets are incomplete. Please configure SIGNING_KEY_BASE64, KEY_ALIAS, KEY_PASSWORD, and KEY_STORE_PASSWORD." >&2
          exit 1

      - name: Decode Keystore
        id: decode_keystore
        run: |
          keystore_path="$RUNNER_TEMP/keystore.jks"
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > "$keystore_path"
          echo "filePath=$keystore_path" >> "$GITHUB_OUTPUT"
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          SIGNING_KEY_STORE_PATH: ${{ steps.decode_keystore.outputs.filePath }}
      
      - name: Read Version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Prepare Release APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk release/quleme.apk
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: quleme-v${{ steps.version.outputs.VERSION }}
          path: release/quleme.apk

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: 去了么 v${{ steps.version.outputs.VERSION }}
          files: release/quleme.apk
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease == true }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
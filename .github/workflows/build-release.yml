name: Build and Release

on:
  push:
    branches: [ main ]
    paths:
      - 'VERSION'
      - 'app/**'
  workflow_dispatch:
    inputs:
      prerelease:
        description: '是否标记为预发布版本'
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      HAS_SIGNING_CONFIG: ${{ secrets.SIGNING_KEY_BASE64 != '' && secrets.KEY_ALIAS != '' && secrets.KEY_PASSWORD != '' && secrets.KEY_STORE_PASSWORD != '' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'

      - name: Check Debug Build
        run: gradle :app:assembleDebug

      - name: Run Android Lint
        run: gradle :app:lintDebug

      - name: Validate Signing Config
        if: env.HAS_SIGNING_CONFIG != 'true'
        run: |
          echo "Release signing secrets are incomplete. Please configure SIGNING_KEY_BASE64, KEY_ALIAS, KEY_PASSWORD, and KEY_STORE_PASSWORD." >&2
          exit 1

      - name: Decode Keystore
        id: decode_keystore
        run: |
          keystore_path="$RUNNER_TEMP/keystore.jks"
          printf '%s' "$SIGNING_KEY_BASE64" | base64 --decode > "$keystore_path"
          echo "filePath=$keystore_path" >> "$GITHUB_OUTPUT"
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          SIGNING_KEY_STORE_PATH: ${{ steps.decode_keystore.outputs.filePath }}
      
      - name: Read Version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Prepare Release APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk release/luleme.apk
      
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Luleme-v${{ steps.version.outputs.VERSION }}
          path: release/luleme.apk

      - name: Generate Release Notes
        id: release_notes
        run: |
          version="${{ steps.version.outputs.VERSION }}"
          current_tag="v${version}"

          if git rev-parse -q --verify "refs/tags/${current_tag}" >/dev/null; then
            if [ "$(git rev-parse "${current_tag}^{commit}")" = "$(git rev-parse HEAD)" ]; then
              previous_tag="$(git describe --tags --abbrev=0 "${current_tag}^{commit}^" 2>/dev/null || true)"
              if [ -n "$previous_tag" ]; then
                range="${previous_tag}..${current_tag}"
              else
                range="${current_tag}"
              fi
            else
              range="${current_tag}..HEAD"
            fi
          else
            previous_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            if [ -n "$previous_tag" ]; then
              range="${previous_tag}..HEAD"
            else
              range="HEAD"
            fi
          fi

          if [ "$range" != "HEAD" ]; then
            echo "Release notes range: $range"
          else
            echo "Release notes range: all commits"
          fi

          commits="$(
            git log "$range" --no-merges --pretty=format:'%s%x09%h' |
              awk -F '\t' '!seen[$1]++ { printf "- %s (%s)\n", $1, $2 }'
          )"
          if [ -z "$commits" ]; then
            commits="- 暂无提交记录"
          fi

          {
            echo "### 更新说明"
            printf '%s\n' "$commits"
            echo
            echo "### 安装说明"
            echo "1. 下载下方的 APK 文件"
            echo "2. 在 Android 设备上安装"
            echo
            echo "> **注意**: 请在卸载前导出重要数据以免丢失。"
          } > release-notes.md
      
      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: 撸了么 v${{ steps.version.outputs.VERSION }}
          files: release/luleme.apk
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease == true }}
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
